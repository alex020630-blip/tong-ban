<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통-반 매핑 시스템</title>
    <script src="database.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --white: #ffffff;
            --bg-gray: #f0f2f5;
            --shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: var(--white); width: 95%; max-width: 850px; padding: 30px; border-radius: 24px; box-shadow: var(--shadow); }

        h2 { text-align: center; color: #333; margin-bottom: 25px; font-weight: 800; }

        .search-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 15px; border: 2px solid #e1e4e8; border-radius: 12px; font-size: 16px; outline: none; }
        .btn-search { padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* 주소 리스트 2열 */
        #addressList { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; padding: 0; margin: 0; list-style: none;
        }
        #addressList li { 
            background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 14px; 
            cursor: pointer; transition: all 0.2s; animation: fadeIn 0.3s ease;
        }
        #addressList li:hover { border-color: var(--primary); background: #f0f7ff; transform: translateY(-2px); }

        /* 페이지네이션 버튼 가시성 강화 */
        .page-ctrl { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 25px; }
        .btn-page { 
            padding: 12px 24px; background: var(--white); border: 2px solid var(--primary); 
            border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: bold; color: var(--primary);
            transition: all 0.2s;
        }
        .btn-page:disabled { border-color: #ddd; color: #aaa; cursor: not-allowed; }
        .btn-page:not(:disabled):hover { background: var(--primary); color: white; }

        /* 팝업 레이어 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal { background: white; width: 95%; max-width: 650px; padding: 35px; border-radius: 24px; position: relative; box-shadow: var(--shadow); }
        .close-x { position: absolute; top: 15px; right: 25px; font-size: 32px; cursor: pointer; color: #999; }

        /* 팝업 내 상세정보 2열 8개 배치 */
        .choice-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: repeat(4, auto);
            gap: 12px; margin-top: 20px;
        }
        .choice-item { 
            background: #f8f9fa; padding: 16px; border-radius: 12px; border: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }
        .choice-info { font-weight: bold; font-size: 1em; color: #444; }
        .choice-res { color: var(--primary); font-weight: 800; font-size: 1.1em; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h2>🕷️ 통·반 탐색기 🕷️</h2>
    
    <div class="search-group">
        <input type="text" id="keyword" placeholder="예) 고등로 48 또는 매산로3가" onkeypress="if(event.keyCode==13) search(1)">
        <button class="btn-search" onclick="search(1)">검색</button>
    </div>

    <ul id="addressList"></ul>

    <div class="page-ctrl" id="mainPagin" style="display:none;">
        <button class="btn-page" id="mainPrev" onclick="search(currentPage - 1)">◀ 이전 주소</button>
        <span id="mainPageNum" style="font-weight:bold; font-size:1.1em; min-width:30px; text-align:center;">1</span>
        <button class="btn-page" id="mainNext" onclick="search(currentPage + 1)">다음 주소 ▶</button>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <span class="close-x" onclick="closePopup()">&times;</span>
        <h3 id="popTitle" style="margin-top:0; text-align:center; font-size:1.5em;">통·반 조회 결과</h3>
        <p id="popSubTitle" style="font-size:1em; color:#666; text-align:center; margin-bottom:25px;"></p>
        
        <div id="popContent" class="choice-grid"></div>

        <div class="page-ctrl" id="popPagin" style="display:none;">
            <button class="btn-page" id="popPrev" onclick="changePopPage(-1)">◀ 이전 구역</button>
            <span id="popPageNum" style="font-weight:bold;">1 / 1</span>
            <button class="btn-page" id="popNext" onclick="changePopPage(1)">다음 구역 ▶</button>
        </div>
        
        <button class="btn-search" onclick="closePopup()" style="width:100%; margin-top:30px;">확인 및 닫기</button>
    </div>
</div>

<script>
    const API_KEY = "devU01TX0FVVEgyMDI2MDQwODIzNTIxMDExNzg3Njg=";
    let allData = [];
    let currentPage = 1;

    let currentCandidates = [];
    let currentPopPage = 1;
    const itemsPerPopPage = 8; // 8개 노출

    window.onload = () => { allData = Object.values(tongBanDatabase).flat(); };

    async function search(page) {
        const keyword = document.getElementById('keyword').value.trim();
        if (!keyword) return;
        currentPage = page;

        const url = `https://business.juso.go.kr/addrlink/addrLinkApi.do?confmKey=${API_KEY}&keyword=${encodeURIComponent(keyword)}&resultType=json&currentPage=${page}&countPerPage=10`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            displayResults(data.results.juso, data.results.common);
        } catch (err) { console.error(err); }
    }

    function displayResults(jusoArr, common) {
        const list = document.getElementById('addressList');
        const pagin = document.getElementById('mainPagin');
        list.innerHTML = "";

        if (!jusoArr || jusoArr.length === 0) { alert("결과가 없습니다."); return; }

        jusoArr.forEach(juso => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${juso.roadAddr}</strong><br><small style="color:#888;">지번: ${juso.jibunAddr}</small>`;
            li.onclick = () => performMapping(juso);
            list.appendChild(li);
        });

        pagin.style.display = "flex";
        document.getElementById('mainPageNum').innerText = currentPage;
        document.getElementById('mainPrev').disabled = (currentPage === 1);
        document.getElementById('mainNext').disabled = (parseInt(common.totalCount) <= currentPage * 10);
    }

    function performMapping(api) {
        const overlay = document.getElementById('overlay');
        document.getElementById('popSubTitle').innerText = api.roadAddr;

        currentCandidates = allData.filter(item => 
            item.emdNm === api.emdNm && item.lnbrMnnm === api.lnbrMnnm && item.lnbrSlno === api.lnbrSlno
        );

        if (currentCandidates.length === 0) {
            const second = allData.find(item => item.emdNm === api.emdNm && item.lnbrMnnm === api.lnbrMnnm && (item.lnbrSlno === "0" || item.lnbrSlno === ""));
            currentCandidates = second ? [second] : [];
        }

        currentPopPage = 1;
        renderPopPage();
        overlay.style.display = "flex";
    }

    function renderPopPage() {
        const container = document.getElementById('popContent');
        const pagin = document.getElementById('popPagin');
        container.innerHTML = "";

        if (currentCandidates.length === 0) {
            container.innerHTML = "<p style='grid-column: span 2; text-align:center; color:#ff4d4d; padding:20px;'>매핑된 데이터가 없습니다.</p>";
            pagin.style.display = "none";
            return;
        }

        const start = (currentPopPage - 1) * itemsPerPopPage;
        const pagedItems = currentCandidates.slice(start, start + itemsPerPopPage);

        pagedItems.forEach(item => {
            const div = document.createElement('div');
            div.className = "choice-item";
            div.innerHTML = `<span class="choice-info">${item.info || '기본'}</span><span class="choice-res">${item.tong}통 ${item.ban}반</span>`;
            container.appendChild(div);
        });

        const totalPages = Math.ceil(currentCandidates.length / itemsPerPopPage);
        if (totalPages > 1) {
            pagin.style.display = "flex";
            document.getElementById('popPageNum').innerText = `${currentPopPage} / ${totalPages}`;
            document.getElementById('popPrev').disabled = (currentPopPage === 1);
            document.getElementById('popNext').disabled = (currentPopPage === totalPages);
        } else {
            pagin.style.display = "none";
        }
    }

    function changePopPage(dir) {
        currentPopPage += dir;
        renderPopPage();
    }

    function closePopup() { document.getElementById('overlay').style.display = "none"; }
</script>

</body>
</html>
